<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>物理シミュレーター一覧</title>
  <style>
    :root {
      --bg: #f4efe6;
      --ink: #18313a;
      --muted: rgba(24, 49, 58, 0.72);
      --panel: rgba(255, 250, 244, 0.9);
      --line: rgba(24, 49, 58, 0.1);
      --accent: #c85b37;
      --accent-soft: rgba(200, 91, 55, 0.12);
      --wave: #2f7b9b;
      --shadow: 0 24px 60px rgba(24, 49, 58, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(47, 123, 155, 0.16), transparent 24%),
        radial-gradient(circle at bottom right, rgba(200, 91, 55, 0.14), transparent 26%),
        var(--bg);
    }

    a { color: inherit; text-decoration: none; }

    .shell {
      width: min(1120px, calc(100% - 24px));
      margin: 18px auto 28px;
      display: grid;
      gap: 18px;
    }

    .hero,
    .section {
      border: 1px solid rgba(255, 255, 255, 0.68);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .hero {
      padding: 28px;
      display: grid;
      gap: 16px;
    }

    .eyebrow,
    .field {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.82);
      color: var(--muted);
      font-weight: 700;
      font-size: 0.9rem;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 4.2rem);
      line-height: 0.96;
      letter-spacing: -0.04em;
    }

    .lead {
      max-width: 42rem;
      color: var(--muted);
      line-height: 1.8;
    }

    .hero-note {
      max-width: 48rem;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.75;
    }

    .section {
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .section-head h2 {
      font-size: 1.35rem;
    }

    .section-head p {
      color: var(--muted);
      line-height: 1.7;
    }

    .category-stack {
      display: grid;
      gap: 22px;
    }

    .category-block {
      display: grid;
      gap: 14px;
    }

    .category-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .category-head h3 {
      font-size: 1.15rem;
    }

    .category-head p {
      color: var(--muted);
      line-height: 1.7;
    }

    .unit-stack {
      display: grid;
      gap: 18px;
    }

    .unit-block {
      display: grid;
      gap: 12px;
    }

    .unit-head {
      display: grid;
      gap: 4px;
    }

    .unit-head h4 {
      margin: 0;
      font-size: 1.02rem;
      color: var(--ink);
    }

    .unit-head p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .sim-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .log-list {
      display: grid;
      gap: 6px;
      margin-top: 6px;
      max-height: 180px;
      overflow-y: auto;
      padding-right: 8px;
      scrollbar-width: thin;
    }

    .log-item {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      align-items: start;
      gap: 10px;
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .log-date {
      color: var(--accent);
      font-weight: 700;
      font-size: 0.84rem;
      letter-spacing: 0.01em;
    }

    .log-item p {
      margin: 0;
      color: var(--muted);
    }

    .archive-block {
      display: grid;
      gap: 8px;
      margin-top: 8px;
      padding-top: 10px;
      border-top: 1px solid rgba(24, 49, 58, 0.06);
    }

    .archive-label {
      font-size: 0.8rem;
      color: rgba(24, 49, 58, 0.5);
      letter-spacing: 0.02em;
    }

    .archive-link {
      font-size: 0.88rem;
      color: rgba(24, 49, 58, 0.62);
      text-decoration: underline;
      text-decoration-color: rgba(24, 49, 58, 0.18);
      text-underline-offset: 0.14em;
    }

    .archive-link:hover {
      color: rgba(24, 49, 58, 0.82);
      text-decoration-color: rgba(24, 49, 58, 0.34);
    }

    .card {
      display: grid;
      gap: 14px;
      padding: 20px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.68));
      transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 36px rgba(24, 49, 58, 0.1);
      border-color: rgba(200, 91, 55, 0.24);
    }

    .card.is-soon {
      background: linear-gradient(180deg, rgba(255,255,255,0.82), rgba(255,255,255,0.62));
    }

    .card.is-soon:hover {
      transform: none;
      box-shadow: none;
      border-color: var(--line);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 10px;
    }

    .icon {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      color: white;
    }

    .icon.mechanics {
      background: linear-gradient(135deg, var(--accent), #d9a247);
    }

    .icon.wave {
      background: linear-gradient(135deg, var(--wave), #79abc2);
    }

    .icon svg {
      width: 34px;
      height: 34px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon.is-image {
      overflow: hidden;
    }

    .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
      display: block;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(200, 91, 55, 0.22);
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .status.soon {
      border-color: rgba(24, 49, 58, 0.12);
      background: rgba(24, 49, 58, 0.08);
      color: var(--muted);
    }

    .card h3 {
      font-size: 1.24rem;
    }

    .card p {
      color: var(--muted);
      line-height: 1.75;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(24, 49, 58, 0.06);
      color: var(--muted);
      font-size: 0.88rem;
    }

    .cta {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 48px;
      padding: 12px 16px;
      border-radius: 18px;
      background: var(--accent);
      color: white;
      font-weight: 700;
      box-shadow: 0 14px 28px rgba(200, 91, 55, 0.22);
    }

    .cta.soon {
      background: rgba(24, 49, 58, 0.1);
      color: var(--muted);
      box-shadow: none;
    }

    @media (max-width: 980px) {
      .sim-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .shell {
        width: min(100% - 16px, 1120px);
        margin: 8px auto 20px;
      }

      .hero,
      .section {
        padding: 18px;
        border-radius: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="eyebrow">公開一覧</div>
      <div>
        <h1>物理シミュレーター一覧</h1>
        <p class="lead">分野ごとに整理したシミュレーター一覧です。見たいテーマを選んで、そのまま各ページを開けます。</p>
        <p class="hero-note">生成AIを用いて作成しています。断りなく、自己責任の範囲内で自由に流用できます。<br />各シミュレーターページの HTML を保存すれば、ローカルでも扱えます。</p>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <div>
          <h2>シミュレーター</h2>
        </div>
      </div>

      <!-- INDEX_CATEGORIES -->
    </section>

    <section class="section">
      <h2>更新ログ</h2>

      <!-- INDEX_LOGS -->

      <!-- INDEX_ARCHIVE -->
    </section>
  </main>
</body>
</html>
