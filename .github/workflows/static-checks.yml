name: Static checks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run repository checks
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File tools/check-ci.ps1
