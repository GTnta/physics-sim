<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>川と船の合成速度シミュレーター</title>
  <style>
    :root {
      --bg: #efe7db;
      --panel: rgba(255, 251, 245, 0.9);
      --line: rgba(24, 49, 58, 0.12);
      --text: #18313a;
      --sub: rgba(24, 49, 58, 0.72);
      --accent: #c85b37;
      --accent-strong: #9f4226;
      --accent-soft: rgba(200, 91, 55, 0.12);
      --wave: #2f7b9b;
      --wave-soft: rgba(47, 123, 155, 0.14);
      --river-fill: rgba(225, 241, 248, 0.94);
      --river-flow: #cf7a1f;
      --x-comp: #c16a1f;
      --y-comp: #2f8b6f;
      --resultant: #b03b47;
      --boat-vec: #2f8b6f;
      --guide: #6d7f87;
      --shadow: 0 22px 50px rgba(24, 49, 58, 0.1);
      --radius: 26px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(47, 123, 155, 0.14), transparent 24%),
        radial-gradient(circle at bottom right, rgba(200, 91, 55, 0.14), transparent 26%),
        linear-gradient(180deg, #f6f1e8 0%, var(--bg) 100%);
      color: var(--text);
    }

    body {
      padding: 10px;
      overflow-x: hidden;
    }

    h1, h2, p { margin: 0; }

    button, input {
      font: inherit;
    }

    button:focus-visible,
    input:focus-visible,
    canvas:focus-visible {
      outline: 3px solid #111827;
      outline-offset: 3px;
    }

    .page {
      width: min(1480px, calc(100vw - 20px));
      margin: 0 auto 18px;
      padding: 0;
    }

    .hero {
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      padding: 22px 24px;
      margin-bottom: 16px;
      display: grid;
      gap: 12px;
    }

    .hero h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .hero p {
      margin: 0;
      max-width: none;
      color: var(--sub);
      font-size: 1rem;
      line-height: 1.78;
      white-space: nowrap;
    }

    .hero-top {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .back-link,
    .eyebrow {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      width: fit-content;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.82);
      color: var(--sub);
      text-decoration: none;
      font-weight: 700;
    }

    .eyebrow {
      background: var(--accent-soft);
      color: var(--accent-strong);
      border-color: rgba(200, 91, 55, 0.2);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(250px, 292px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.68);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(12px);
      min-width: 0;
    }

    .panel-header {
      padding: 18px 20px 12px;
      border-bottom: 1px solid var(--line);
    }

    .panel-header h2 {
      margin: 0;
      font-size: 1.12rem;
    }

    .panel-body {
      padding: 14px 18px 18px;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--sub);
    }

    .control-block {
      padding: 14px 0 16px;
      border-bottom: 1px dashed rgba(24, 49, 58, 0.14);
    }

    .control-block:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
    }

    .label-row label {
      font-weight: 800;
      font-size: 0.96rem;
    }

    .value-pill {
      min-width: 94px;
      text-align: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      border: 1px solid rgba(200, 91, 55, 0.18);
      color: var(--accent-strong);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .input-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 90px;
      gap: 9px;
      align-items: center;
    }

    input[type="range"] {
      width: 100%;
      touch-action: pan-y;
      appearance: none;
      background: transparent;
      height: 18px;
      --slider-color: rgba(47, 123, 155, 0.42);
      --slider-track: rgba(24, 49, 58, 0.08);
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 6px;
      border-radius: 999px;
      background: var(--slider-track);
      border: 1px solid rgba(24, 49, 58, 0.08);
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 16px;
      height: 16px;
      margin-top: -6px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.92);
      background: var(--slider-color);
      box-shadow: 0 3px 8px rgba(24, 49, 58, 0.16);
    }

    input[type="range"]::-moz-range-track {
      height: 6px;
      border-radius: 999px;
      background: var(--slider-track);
      border: 1px solid rgba(24, 49, 58, 0.08);
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.92);
      background: var(--slider-color);
      box-shadow: 0 3px 8px rgba(24, 49, 58, 0.16);
    }

    input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.82);
      font-variant-numeric: tabular-nums;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .button-row.compact {
      display: grid;
      grid-template-columns: 1fr;
    }

    .preset-btn {
      min-height: 50px;
      width: 100%;
      text-align: left;
      border-radius: 18px;
      padding: 10px 13px;
      border: 2px solid rgba(24, 49, 58, 0.08);
      background: rgba(255, 255, 255, 0.82);
      display: grid;
      gap: 2px;
      justify-items: start;
      align-content: center;
    }

    .preset-btn strong {
      line-height: 1.2;
    }

    .preset-btn span {
      color: var(--sub);
      font-size: 0.82rem;
      line-height: 1.25;
    }

    button {
      border: 1px solid transparent;
      background: linear-gradient(180deg, rgba(47, 123, 155, 0.1), rgba(255, 255, 255, 0.9));
      border-color: rgba(47, 123, 155, 0.16);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 13px;
      font-weight: 800;
      cursor: pointer;
      min-height: 40px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    button.active {
      background: rgba(255, 247, 238, 0.96);
      border-color: rgba(200, 91, 55, 0.38);
      color: var(--accent-strong);
      box-shadow: 0 0 0 3px rgba(200, 91, 55, 0.08);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(24, 49, 58, 0.08);
    }

    button.primary {
      background: linear-gradient(180deg, rgba(47, 139, 111, 0.18), rgba(255, 255, 255, 0.92));
      color: var(--boat-vec);
      border-color: rgba(47, 139, 111, 0.26);
      box-shadow: 0 8px 18px rgba(47, 139, 111, 0.08);
    }

    button.alt {
      background: linear-gradient(180deg, rgba(47, 123, 155, 0.12), rgba(255, 255, 255, 0.92));
      border-color: rgba(47, 123, 155, 0.16);
      color: var(--wave);
    }

    .play-main {
      min-width: 180px;
      justify-content: center;
    }

    .play-main.running {
      background: linear-gradient(180deg, rgba(207, 122, 31, 0.2), rgba(255, 255, 255, 0.9));
      border-color: rgba(207, 122, 31, 0.28);
      color: var(--x-comp);
      box-shadow: 0 8px 18px rgba(207, 122, 31, 0.1);
    }

    .reset-button {
      background: linear-gradient(180deg, rgba(200, 91, 55, 0.12), rgba(255, 255, 255, 0.94));
      border-color: rgba(200, 91, 55, 0.2);
      color: var(--accent-strong);
    }

    .check-grid {
      display: grid;
      gap: 10px;
    }

    .toggle {
      position: relative;
      min-height: 42px;
      padding: 8px 62px 8px 14px;
      border-radius: 18px;
      border: 1px solid rgba(47, 123, 155, 0.28);
      background: rgba(47, 123, 155, 0.08);
      color: var(--wave);
      text-align: left;
    }

    .toggle::before {
      content: "";
      position: absolute;
      right: 13px;
      top: 50%;
      width: 38px;
      height: 18px;
      border-radius: 999px;
      border: 1px solid rgba(47, 123, 155, 0.24);
      background: rgba(255, 255, 255, 0.78);
      transform: translateY(-50%);
    }

    .toggle::after {
      content: "";
      position: absolute;
      right: 36px;
      top: 50%;
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: rgba(47, 123, 155, 0.36);
      transform: translateY(-50%);
      transition: right 120ms ease, background 120ms ease;
    }

    .toggle.active {
      background: rgba(47, 123, 155, 0.14);
      border-color: rgba(47, 123, 155, 0.42);
      color: var(--wave);
      box-shadow: 0 8px 18px rgba(47, 123, 155, 0.08);
    }

    .toggle.active::after {
      right: 15px;
      background: var(--wave);
    }

    .sub-note {
      margin-top: 10px;
      color: var(--sub);
      font-size: 0.93rem;
      line-height: 1.7;
    }

    .stage-wrap {
      display: grid;
      gap: 16px;
    }

    .canvas-card {
      padding: 16px;
    }

    .canvas-shell {
      position: relative;
      line-height: 0;
    }

    canvas {
      width: 100%;
      display: block;
      background: linear-gradient(180deg, rgba(255,255,255,0.96) 0%, rgba(248, 244, 237, 0.98) 100%);
      border: 1px solid rgba(24, 49, 58, 0.08);
      border-radius: 20px;
      touch-action: pan-x pan-y pinch-zoom;
      cursor: default;
      aspect-ratio: 980 / 470;
    }

    canvas.dragging {
      cursor: grabbing;
    }

    canvas:focus {
      outline: none;
    }

    canvas:focus-visible {
      outline: 2px solid rgba(47, 123, 155, 0.34);
      outline-offset: 3px;
    }

    .canvas-drag-target {
      position: absolute;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      background: transparent;
      touch-action: none;
      cursor: grab;
      z-index: 2;
    }

    .canvas-drag-target.dragging {
      cursor: grabbing;
    }

    .canvas-drag-target.hidden {
      display: none;
    }

    .playback-bar {
      display: block;
      margin-top: 14px;
      padding: 0;
      border-radius: 18px;
      background: transparent;
    }

    .under-controls {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(24, 49, 58, 0.1);
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
    }

    .under-control {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.68);
      border-radius: 16px;
      padding: 10px 12px;
      min-width: 0;
    }

    .under-control .label-row {
      margin-bottom: 6px;
    }

    .under-control .value-pill {
      padding: 5px 9px;
      min-width: 84px;
    }

    .inline-setting {
      display: grid;
      grid-template-columns: auto minmax(120px, 1fr) 76px auto;
      align-items: center;
      gap: 8px;
    }

    .inline-setting label,
    .inline-setting .unit {
      white-space: nowrap;
    }

    .inline-setting input[type="number"] {
      text-align: center;
    }

    .angle .label-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
    }

    .angle-actions {
      display: flex;
      justify-content: center;
      gap: 5px;
      min-width: 0;
    }

    .angle-actions button {
      min-height: 28px;
      padding: 5px 8px;
      font-size: 0.78rem;
      border-radius: 999px;
      white-space: nowrap;
    }

    .under-control.primary-row { grid-column: span 2; }
    .under-control.secondary-row { grid-column: span 3; }
    .under-control.flow input[type="range"] {
      --slider-color: rgba(207, 122, 31, 0.64);
      --slider-track: rgba(207, 122, 31, 0.16);
    }
    .under-control.flow .value-pill {
      background: rgba(207, 122, 31, 0.12);
      border-color: rgba(207, 122, 31, 0.22);
      color: var(--x-comp);
    }
    .under-control.boat input[type="range"],
    .under-control.angle input[type="range"] {
      --slider-color: rgba(47, 139, 111, 0.6);
      --slider-track: rgba(47, 139, 111, 0.14);
    }
    .under-control.boat .value-pill,
    .under-control.angle .value-pill {
      background: rgba(47, 139, 111, 0.12);
      border-color: rgba(47, 139, 111, 0.22);
      color: var(--boat-vec);
    }
    .under-control.width input[type="range"] {
      --slider-color: rgba(109, 127, 135, 0.62);
      --slider-track: rgba(109, 127, 135, 0.16);
    }
    .under-control.playback input[type="range"] {
      --slider-color: rgba(200, 91, 55, 0.58);
      --slider-track: rgba(200, 91, 55, 0.14);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.74);
      border-radius: 18px;
      padding: 14px;
      min-height: 86px;
    }

    .stat.important {
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(47, 123, 155, 0.08));
      border-color: rgba(47, 123, 155, 0.18);
    }

    .stat .k {
      font-size: 0.88rem;
      color: var(--sub);
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .stat .v {
      font-size: 1.12rem;
      font-weight: 900;
      line-height: 1.3;
      font-variant-numeric: tabular-nums;
    }

    .stat .v.orange { color: var(--x-comp); }
    .stat .v.green { color: var(--y-comp); }
    .stat .v.red { color: var(--resultant); }

    @media (max-width: 1100px) {
      .hero {
        padding: 14px 18px;
        gap: 8px;
        margin-bottom: 12px;
      }

      .hero h1 {
        font-size: clamp(1.8rem, 4vw, 2.4rem);
      }

      .hero p {
        display: none;
      }

      .canvas-card {
        padding: 12px;
      }

      .angle .value-pill {
        display: none;
      }
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .under-controls {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .under-control.primary-row,
      .under-control.secondary-row { grid-column: span 1; }

      .stats-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100%, calc(100vw - 12px));
        margin: 0 auto 12px;
      }

      .panel-body,
      .panel-header,
      .hero {
        padding-left: 16px;
        padding-right: 16px;
      }

      .input-row {
        grid-template-columns: 1fr 84px;
      }

      .inline-setting {
        grid-template-columns: auto minmax(86px, 1fr) 66px auto;
        gap: 6px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .button-row.compact {
        grid-template-columns: 1fr;
      }

      .playback-bar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero-top">
        <a class="back-link" href="../index.html">一覧へ戻る</a>
        <div class="eyebrow">力学 / 相対運動・合成速度</div>
      </div>
      <h1>川と船の合成速度シミュレーター</h1>
      <p>
        川の流れと船の静水中での速度を足し合わせ、岸から見た合成速度、到着位置、対岸までの時間を確かめる教材です。
      </p>
    </section>

    <div class="layout">
      <aside class="panel">
        <div class="panel-body">
          <div class="control-block">
            <div class="section-title">場面</div>
            <div class="button-row compact">
              <button class="preset-btn active" data-preset="straight" type="button"><strong>まっすぐ向ける</strong><span>岸に垂直・流される基準形</span></button>
              <button class="preset-btn" data-preset="cancel" type="button"><strong>流されない</strong><span>上流側へ向けて x 成分を打ち消す</span></button>
              <button class="preset-btn" data-preset="fast-current" type="button"><strong>流れが速い</strong><span>川の速度が大きい場合</span></button>
              <button class="preset-btn" data-preset="wide" type="button"><strong>川幅を広く</strong><span>時間と道のりの変化を見る</span></button>
            </div>
          </div>

          <div class="control-block">
            <div class="section-title">表示</div>
            <div class="check-grid">
              <button class="toggle active" data-toggle="showVectors" type="button" aria-pressed="true">合成速度と補助線</button>
              <button class="toggle active" data-toggle="showTrail" type="button" aria-pressed="true">航跡</button>
            </div>
          </div>
        </div>
      </aside>

      <main class="stage-wrap">
        <section class="panel canvas-card">
          <div class="canvas-shell">
            <canvas id="simCanvas" width="980" height="470" aria-label="川と船のシミュレーション画面"></canvas>
            <div id="boatDragTarget" class="canvas-drag-target hidden" aria-hidden="true"></div>
            <div id="vectorDragTarget" class="canvas-drag-target hidden" aria-hidden="true"></div>
          </div>
          <div class="playback-bar" aria-label="再生操作">
            <div class="button-row">
              <button id="playPauseBtn" class="primary play-main">再生</button>
              <button id="resetBtn">スタート地点に戻す</button>
              <button id="textbookBtn" class="reset-button">リセット</button>
            </div>
          </div>
          <div class="under-controls" aria-label="条件設定">
            <div class="under-control primary-row flow">
              <div class="label-row">
                <label for="currentRange">川の流速 u</label>
                <div class="value-pill" id="currentLabel">3.0 m/s</div>
              </div>
              <div class="input-row">
                <input id="currentRange" type="range" min="0" max="8" step="0.1" value="3.0" />
                <input id="currentNumber" type="number" min="0" max="8" step="0.1" value="3.0" />
              </div>
            </div>

            <div class="under-control primary-row boat">
              <div class="label-row">
                <label for="boatRange">静水時の船の速さ v</label>
                <div class="value-pill" id="boatLabel">4.0 m/s</div>
              </div>
              <div class="input-row">
                <input id="boatRange" type="range" min="0" max="10" step="0.1" value="4.0" />
                <input id="boatNumber" type="number" min="0" max="10" step="0.1" value="4.0" />
              </div>
            </div>

            <div class="under-control primary-row angle">
              <div class="label-row">
                <label for="angleRange">船首 θ</label>
                <div class="angle-actions" aria-label="船首の向きの補助操作">
                  <button id="straightBtn" type="button">垂直</button>
                  <button id="cancelBtn" class="alt" type="button">打消し</button>
                </div>
                <div class="value-pill" id="angleLabel">0.0 °</div>
              </div>
              <div class="input-row">
                <input id="angleRange" type="range" min="-85" max="85" step="0.5" value="0" />
                <input id="angleNumber" type="number" min="-85" max="85" step="0.5" value="0" />
              </div>
            </div>

            <div class="under-control secondary-row width">
              <div class="inline-setting">
                <label for="widthRange">川幅 W</label>
                <input id="widthRange" type="range" min="10" max="50" step="0.5" value="20.0" />
                <input id="widthNumber" type="number" min="10" max="50" step="0.5" value="20.0" />
                <span class="unit">m</span>
              </div>
            </div>

            <div class="under-control secondary-row playback">
              <div class="inline-setting">
                <label for="speedRange">再生速度</label>
                <input id="speedRange" type="range" min="1" max="5" step="0.1" value="3.0" />
                <input id="speedNumber" type="number" min="1" max="5" step="0.1" value="3.0" />
                <span class="unit">倍</span>
              </div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>結果</h2>
          </div>
          <div class="panel-body">
            <div class="stats-grid">
              <div class="stat important"><div class="k">x成分（岸から見た速度）</div><div class="v orange" id="vxOut">0.00 m/s</div></div>
              <div class="stat important"><div class="k">y成分（岸から見た速度）</div><div class="v green" id="vyOut">0.00 m/s</div></div>
              <div class="stat important"><div class="k">合成速度の大きさ</div><div class="v red" id="speedOut">0.00 m/s</div></div>
              <div class="stat important"><div class="k">対岸までの時間</div><div class="v" id="timeOut">0.00 s</div></div>
              <div class="stat"><div class="k">変位の x 成分</div><div class="v orange" id="dxOut">0.00 m</div></div>
              <div class="stat"><div class="k">変位の y 成分</div><div class="v green" id="dyOut">0.00 m</div></div>
              <div class="stat"><div class="k">道のり</div><div class="v red" id="pathOut">0.00 m</div></div>
              <div class="stat"><div class="k">到着判定</div><div class="v" id="statusOut">待機中</div></div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    const COLORS = {
      riverFlow: '#f59e0b',
      riverFlowBg: '#60a5fa',
      xComp: '#b45309',
      yComp: '#15803d',
      result: '#b91c1c',
      boat: '#15803d',
      dispX: 'rgba(194, 143, 88, 0.7)',
      dispY: 'rgba(87, 143, 170, 0.68)',
      dispPath: 'rgba(203, 92, 92, 0.7)',
      guide: '#64748b',
      bank: '#0f172a',
      grid: 'rgba(100,116,139,0.14)'
    };

    const state = {
      current: 3.0,
      boat: 4.0,
      angleDeg: 0,
      width: 20.0,
      startX: 0,
      playback: 3.0,
      activePreset: 'straight',
      showVectors: true,
      showTrail: true,
      elapsed: 0,
      running: false,
      lastTs: null,
      trail: [],
      draggingBoat: false,
      dragMode: null,
      interaction: null,
      justArrived: false
    };

    const refs = {
      currentRange: document.getElementById('currentRange'),
      currentNumber: document.getElementById('currentNumber'),
      currentLabel: document.getElementById('currentLabel'),
      boatRange: document.getElementById('boatRange'),
      boatNumber: document.getElementById('boatNumber'),
      boatLabel: document.getElementById('boatLabel'),
      angleRange: document.getElementById('angleRange'),
      angleNumber: document.getElementById('angleNumber'),
      angleLabel: document.getElementById('angleLabel'),
      widthRange: document.getElementById('widthRange'),
      widthNumber: document.getElementById('widthNumber'),
      speedRange: document.getElementById('speedRange'),
      speedNumber: document.getElementById('speedNumber'),
      vxOut: document.getElementById('vxOut'),
      vyOut: document.getElementById('vyOut'),
      speedOut: document.getElementById('speedOut'),
      timeOut: document.getElementById('timeOut'),
      dxOut: document.getElementById('dxOut'),
      dyOut: document.getElementById('dyOut'),
      pathOut: document.getElementById('pathOut'),
      statusOut: document.getElementById('statusOut')
    };

    const toggleButtons = Array.from(document.querySelectorAll('[data-toggle]'));
    const playPauseBtn = document.getElementById('playPauseBtn');
    const dragTargets = {
      boat: document.getElementById('boatDragTarget'),
      vector: document.getElementById('vectorDragTarget')
    };

    const presets = {
      straight: { current: 3.0, boat: 4.0, angleDeg: 0, width: 20.0, startX: 0, playback: 3.0 },
      cancel: { current: 3.0, boat: 4.0, angleDeg: 48.6, width: 20.0, startX: 0, playback: 3.0 },
      'fast-current': { current: 5.0, boat: 4.0, angleDeg: 0, width: 20.0, startX: 0, playback: 3.0 },
      wide: { current: 3.0, boat: 4.0, angleDeg: 0, width: 36.0, startX: 0, playback: 3.0 }
    };

    function clamp(v, min, max) {
      return Math.min(max, Math.max(min, v));
    }

    function fmt(value, unit, digits = 2) {
      const sign = value > 0 ? '+' : '';
      return `${sign}${value.toFixed(digits)} ${unit}`;
    }

    function syncInputsFromState() {
      refs.currentRange.value = refs.currentNumber.value = state.current;
      refs.boatRange.value = refs.boatNumber.value = state.boat;
      refs.angleRange.value = refs.angleNumber.value = state.angleDeg;
      refs.widthRange.value = refs.widthNumber.value = state.width;
      refs.speedRange.value = refs.speedNumber.value = state.playback;
    }

    function updateLabels() {
      refs.currentLabel.textContent = `${state.current.toFixed(1)} m/s`;
      refs.boatLabel.textContent = `${state.boat.toFixed(1)} m/s`;
      refs.angleLabel.textContent = `${state.angleDeg.toFixed(1)} °`;
    }

    function updatePlayPauseButton() {
      playPauseBtn.textContent = state.running ? '一時停止' : '再生';
      playPauseBtn.setAttribute('aria-pressed', String(state.running));
      playPauseBtn.classList.toggle('running', state.running);
    }

    function updateToggleButtons() {
      toggleButtons.forEach((button) => {
        const key = button.dataset.toggle;
        const active = Boolean(state[key]);
        button.classList.toggle('active', active);
        button.setAttribute('aria-pressed', String(active));
      });
    }

    function calc() {
      const rad = state.angleDeg * Math.PI / 180;
      const boatX = -state.boat * Math.sin(rad);
      const boatY = state.boat * Math.cos(rad);
      const vx = state.current + boatX;
      const vy = boatY;
      const speed = Math.hypot(vx, vy);
      const crossable = vy > 1e-9;
      const time = crossable ? state.width / vy : Infinity;
      const drift = Number.isFinite(time) ? vx * time : Infinity;
      const path = Number.isFinite(time) ? speed * time : Infinity;
      const cancelPossible = state.boat >= state.current && state.boat > 0;
      const cancelAngle = cancelPossible ? Math.asin(state.current / state.boat) * 180 / Math.PI : null;
      return { rad, boatX, boatY, vx, vy, speed, time, drift, path, crossable, cancelPossible, cancelAngle };
    }

    function linkPair(rangeEl, numberEl, key) {
      const sync = (raw) => {
        const val = clamp(Number(raw), Number(rangeEl.min), Number(rangeEl.max));
        state[key] = val;
        if (key === 'width') {
          state.width = Math.max(10, val);
        }
        markActivePreset('');
        updateLabels();
        syncInputsFromState();
        recalc(true);
      };
      rangeEl.addEventListener('input', (e) => sync(e.target.value));
      numberEl.addEventListener('input', (e) => sync(e.target.value));
    }

    function updateResults() {
      const c = calc();
      refs.vxOut.textContent = fmt(c.vx, 'm/s');
      refs.vyOut.textContent = `${c.vy.toFixed(2)} m/s`;
      refs.speedOut.textContent = `${c.speed.toFixed(2)} m/s`;
      refs.dxOut.textContent = Number.isFinite(c.drift) ? fmt(c.drift, 'm') : '—';
      refs.dyOut.textContent = c.crossable ? `${state.width.toFixed(2)} m` : '—';
      refs.pathOut.textContent = Number.isFinite(c.path) ? `${c.path.toFixed(2)} m` : '—';

      if (!c.crossable) {
        refs.timeOut.textContent = '渡れません';
        refs.statusOut.textContent = '対岸へ進めません';
      } else if (state.elapsed <= 0.001) {
        refs.timeOut.textContent = `${c.time.toFixed(2)} s`;
        refs.statusOut.textContent = '待機中';
      } else if (state.elapsed + 1e-6 >= c.time) {
        refs.timeOut.textContent = `${c.time.toFixed(2)} s`;
        refs.statusOut.textContent = '到着';
      } else {
        refs.timeOut.textContent = `${c.time.toFixed(2)} s`;
        refs.statusOut.textContent = '移動中';
      }
    }

    function markActivePreset(id = '') {
      document.querySelectorAll('.preset-btn').forEach((button) => {
        button.classList.toggle('active', button.dataset.preset === id);
      });
    }

    function applyPreset(id) {
      const preset = presets[id];
      if (!preset) return;
      Object.assign(state, preset);
      state.activePreset = id;
      syncInputsFromState();
      markActivePreset(id);
      recalc(true);
    }

    function resetActivePreset() {
      applyPreset(state.activePreset || 'straight');
    }

    function recalc(resetAnimation = false) {
      if (resetAnimation) {
        state.running = false;
        state.elapsed = 0;
        state.lastTs = null;
        state.trail = [];
        state.justArrived = false;
      }
      updateLabels();
      updateResults();
      updatePlayPauseButton();
      updateToggleButtons();
      draw();
    }

    function getTransform() {
      const width = canvas.width;
      const height = canvas.height;
      const margin = { left: 72, right: 108, top: 42, bottom: 56 };
      const worldXHalf = 42;
      const worldYMax = Math.max(state.width, 40);
      const scale = Math.min(
        (width - margin.left - margin.right) / (worldXHalf * 2),
        (height - margin.top - margin.bottom) / worldYMax
      );
      return {
        scale,
        margin,
        xMin: -worldXHalf,
        xMax: worldXHalf,
        yMin: 0,
        yMax: worldYMax,
        left: margin.left + worldXHalf * scale,
        bottom: height - margin.bottom,
        width,
        height
      };
    }

    function worldToCanvas(x, y, tr) {
      return {
        x: tr.left + x * tr.scale,
        y: tr.bottom - y * tr.scale
      };
    }

    function canvasToWorldX(px, tr) {
      return (px - tr.left) / tr.scale;
    }

    function getCanvasPoint(evt) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (evt.clientX - rect.left) * (canvas.width / rect.width),
        y: (evt.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function drawArrow(x1, y1, x2, y2, color, options = {}) {
      const {
        width = 3,
        dash = [],
        alpha = 1,
        head = 12
      } = options;
      const dx = x2 - x1;
      const dy = y2 - y1;
      const len = Math.hypot(dx, dy);
      if (len < 0.01) return;
      const ux = dx / len;
      const uy = dy / len;
      const headLen = Math.min(Math.max(head, 9), Math.max(len * 0.45, 9));
      const shaftEndX = x2 - ux * Math.min(headLen * 0.72, len * 0.5);
      const shaftEndY = y2 - uy * Math.min(headLen * 0.72, len * 0.5);
      ctx.save();
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = width;
      ctx.globalAlpha = alpha;
      ctx.setLineDash(dash);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(shaftEndX, shaftEndY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - ux * headLen - uy * 6, y2 - uy * headLen + ux * 6);
      ctx.lineTo(x2 - ux * headLen + uy * 6, y2 - uy * headLen - ux * 6);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawVectorLabel(text, x, y, color, offsetX = 10, offsetY = -12) {
      ctx.save();
      ctx.font = '800 13px sans-serif';
      const padX = 8;
      const h = 24;
      const w = ctx.measureText(text).width + padX * 2;
      let bx = x + offsetX;
      let by = y + offsetY;
      bx = clamp(bx, 10, canvas.width - w - 10);
      by = clamp(by, 10, canvas.height - h - 10);
      ctx.fillStyle = 'rgba(255,255,255,0.94)';
      ctx.strokeStyle = 'rgba(148,163,184,0.44)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(bx, by, w, h, 10);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = color;
      ctx.fillText(text, bx + padX, by + 16);
      ctx.restore();
    }

    function drawDragHandle(x, y) {
      ctx.save();
      ctx.fillStyle = 'rgba(47, 139, 111, 0.05)';
      ctx.strokeStyle = 'rgba(47, 139, 111, 0.38)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(x, y, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function setDragTargetPosition(target, point) {
      const rect = canvas.getBoundingClientRect();
      const x = point.x * rect.width / canvas.width;
      const y = point.y * rect.height / canvas.height;
      target.style.left = `${x}px`;
      target.style.top = `${y}px`;
      target.classList.remove('hidden');
    }

    function syncCanvasDragTargets() {
      if (!state.interaction) {
        dragTargets.boat.classList.add('hidden');
        dragTargets.vector.classList.add('hidden');
        return;
      }
      setDragTargetPosition(dragTargets.boat, {
        x: state.interaction.boatX,
        y: state.interaction.boatY
      });
      setDragTargetPosition(dragTargets.vector, {
        x: state.interaction.handleX,
        y: state.interaction.handleY
      });
    }

    function drawGuideLine(x1, y1, x2, y2, color = COLORS.guide, width = 2) {
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.setLineDash([8, 7]);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.restore();
    }

    function drawBoat(px, py, headingRad) {
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(-headingRad);
      ctx.beginPath();
      ctx.moveTo(0, -16);
      ctx.lineTo(11, 12);
      ctx.lineTo(0, 8);
      ctx.lineTo(-11, 12);
      ctx.closePath();
      ctx.fillStyle = '#0f172a';
      ctx.fill();
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = '#ffffff';
      ctx.stroke();
      ctx.restore();
    }

    function drawBadge(text, x, y, options = {}) {
      const { fg = '#16202f', bg = 'rgba(255,255,255,0.94)' } = options;
      ctx.save();
      ctx.font = '700 14px sans-serif';
      const padX = 10;
      const h = 28;
      const w = ctx.measureText(text).width + padX * 2;
      ctx.fillStyle = bg;
      ctx.strokeStyle = 'rgba(148,163,184,0.45)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, 12);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = fg;
      ctx.fillText(text, x + padX, y + 19);
      ctx.restore();
    }

    function drawFlowMarks(tr) {
      const rows = Math.max(4, Math.round(state.width / 5));
      const cols = 5;
      const riverTopY = state.width;
      for (let r = 0; r < rows; r++) {
        const y = riverTopY * (r + 0.75) / (rows + 0.5);
        for (let c = 0; c < cols; c++) {
          const x = tr.xMin + (tr.xMax - tr.xMin) * (c + 0.6) / cols;
          const p1 = worldToCanvas(x, y, tr);
          const p2 = { x: p1.x + 28, y: p1.y };
          drawArrow(p1.x, p1.y, p2.x, p2.y, COLORS.riverFlowBg, { width: 1.8, dash: [6, 8], alpha: 0.18, head: 7 });
        }
      }
    }

    function drawSceneDisplacement(tr, c) {
      if (!Number.isFinite(c.drift)) return;
      const startWorldX = state.startX;
      const arrivalWorldX = state.startX + c.drift;
      const arrival = worldToCanvas(arrivalWorldX, state.width, tr);
      const foot = worldToCanvas(arrivalWorldX, 0, tr);
      const start = worldToCanvas(startWorldX, 0, tr);
      const visibleX = foot.x > tr.margin.left && foot.x < tr.width - tr.margin.right;
      if (!visibleX) return;

      drawArrow(start.x, start.y, foot.x, foot.y, COLORS.dispX, { width: 3, head: 10 });
      drawArrow(foot.x, foot.y, arrival.x, arrival.y, COLORS.dispY, { width: 3, head: 10 });
      drawArrow(start.x, start.y, arrival.x, arrival.y, COLORS.dispPath, { width: 3.8, head: 10 });

      const side = c.drift >= 0 ? 1 : -1;
      drawVectorLabel(`Δx ${fmt(c.drift, 'm')}`, (start.x + foot.x) / 2, foot.y, '#8b6a42', -44, 14);
      drawVectorLabel(`Δy ${state.width.toFixed(2)} m`, foot.x, (foot.y + arrival.y) / 2, '#426f84', side > 0 ? 14 : -104, -12);
      drawVectorLabel(`道のり ${c.path.toFixed(2)} m`, (start.x + arrival.x) / 2, (start.y + arrival.y) / 2, '#9f4141', side > 0 ? -102 : 14, -34);
    }

    function draw() {
      const c = calc();
      const tr = getTransform();
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const leftTop = worldToCanvas(tr.xMin, state.width, tr);
      const rightBottom = worldToCanvas(tr.xMax, 0, tr);
      ctx.fillStyle = '#e9f6ff';
      ctx.fillRect(leftTop.x, leftTop.y, rightBottom.x - leftTop.x, rightBottom.y - leftTop.y);

      for (let gx = Math.ceil(tr.xMin); gx <= Math.floor(tr.xMax); gx += 4) {
        const p1 = worldToCanvas(gx, 0, tr);
        const p2 = worldToCanvas(gx, state.width, tr);
        ctx.strokeStyle = COLORS.grid;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }

      for (let gy = 4; gy < state.width - 0.001; gy += 4) {
        const p1 = worldToCanvas(tr.xMin, gy, tr);
        const p2 = worldToCanvas(tr.xMax, gy, tr);
        ctx.strokeStyle = COLORS.grid;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }

      const bottomLeft = worldToCanvas(tr.xMin, 0, tr);
      const bottomRight = worldToCanvas(tr.xMax, 0, tr);
      const topLeft = worldToCanvas(tr.xMin, state.width, tr);
      const topRight = worldToCanvas(tr.xMax, state.width, tr);

      ctx.strokeStyle = 'rgba(15,23,42,0.92)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(bottomLeft.x, bottomLeft.y);
      ctx.lineTo(bottomRight.x, bottomRight.y);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(topLeft.x, topLeft.y);
      ctx.lineTo(topRight.x, topRight.y);
      ctx.stroke();

      drawFlowMarks(tr);

      const widthTop = worldToCanvas(tr.xMax + 1.1, state.width, tr);
      const widthBottom = worldToCanvas(tr.xMax + 1.1, 0, tr);
      drawGuideLine(widthTop.x, widthTop.y, widthBottom.x, widthBottom.y, 'rgba(15,23,42,0.55)', 2);
      drawBadge(`川幅 ${state.width.toFixed(1)} m`, widthTop.x - 76, (widthTop.y + widthBottom.y) / 2 - 14, { fg: '#16202f' });

      const t = Math.min(state.elapsed, Number.isFinite(c.time) ? c.time : 0);
      const boatX = state.startX + c.vx * t;
      const boatY = Math.min(c.vy * t, state.width);
      const boatP = worldToCanvas(boatX, boatY, tr);
      const startP = worldToCanvas(state.startX, 0, tr);
      const arrivalP = Number.isFinite(c.drift) ? worldToCanvas(state.startX + c.drift, state.width, tr) : null;

      if (state.showTrail && c.crossable) {
        if (state.trail.length === 0) state.trail.push({ x: state.startX, y: 0 });
        const last = state.trail[state.trail.length - 1];
        if (!last || Math.hypot(last.x - boatX, last.y - boatY) > 0.08) {
          state.trail.push({ x: boatX, y: boatY });
        }
        ctx.save();
        ctx.strokeStyle = 'rgba(185,28,28,0.42)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        state.trail.forEach((pt, i) => {
          const p = worldToCanvas(pt.x, pt.y, tr);
          if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
        });
        ctx.stroke();
        ctx.restore();
      }

      ctx.save();
      ctx.fillStyle = '#111827';
      ctx.beginPath();
      ctx.arc(startP.x, startP.y, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(startP.x, startP.y, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      if (state.showVectors && arrivalP && Number.isFinite(c.drift)) {
        ctx.save();
        ctx.fillStyle = '#b91c1c';
        ctx.beginPath();
        ctx.rect(arrivalP.x - 5, arrivalP.y - 5, 10, 10);
        ctx.fill();
        ctx.restore();
      }

      const vectorScale = 20;
        const origin = boatP;
        const riverTip = { x: origin.x + state.current * vectorScale, y: origin.y };
        const boatRelTip = { x: origin.x + c.boatX * vectorScale, y: origin.y - c.boatY * vectorScale };
        const resultTip = { x: origin.x + c.vx * vectorScale, y: origin.y - c.vy * vectorScale };

        if (!state.running && t <= 0.001) {
          state.interaction = {
            handleX: boatRelTip.x,
            handleY: boatRelTip.y,
            boatX: boatP.x,
            boatY: boatP.y,
            originX: origin.x,
            originY: origin.y,
            vectorScale,
            transform: tr
          };
          drawDragHandle(boatRelTip.x, boatRelTip.y);
        } else {
          state.interaction = null;
        }

        drawArrow(origin.x, origin.y, riverTip.x, riverTip.y, COLORS.riverFlow, { width: 3.8, dash: [8, 6], head: 10 });
        drawArrow(origin.x, origin.y, boatRelTip.x, boatRelTip.y, COLORS.boat, { width: 4.2, head: 10 });

        if (state.showVectors) {
          drawGuideLine(riverTip.x, riverTip.y, resultTip.x, resultTip.y);
          drawGuideLine(boatRelTip.x, boatRelTip.y, resultTip.x, resultTip.y);
          drawArrow(origin.x, origin.y, resultTip.x, resultTip.y, COLORS.result, { width: 5.1, head: 12 });
        }

      drawBoat(boatP.x, boatP.y, c.rad);

      const complete = c.crossable && state.elapsed + 1e-6 >= c.time;
      if (complete) {
        drawSceneDisplacement(tr, c);
      }

      drawBadge(`時刻 ${t.toFixed(2)} s`, 18, 18);
      drawBadge(state.running ? '再生中' : complete ? '到着' : '停止中', 18, 54, {
        fg: complete ? '#7f1d1d' : state.running ? '#1e40af' : '#16202f',
        bg: complete ? 'rgba(254,242,242,0.96)' : state.running ? 'rgba(239,246,255,0.96)' : 'rgba(255,255,255,0.96)'
      });
      syncCanvasDragTargets();
    }

    function resetSimulation() {
      state.running = false;
      state.elapsed = 0;
      state.lastTs = null;
      state.trail = [];
      state.justArrived = false;
      updatePlayPauseButton();
      draw();
      updateResults();
    }

    function startSimulation() {
      const c = calc();
      if (!c.crossable) {
        alert('この向きでは対岸へ進めません。');
        return;
      }
      if (state.elapsed >= c.time) {
        state.elapsed = 0;
        state.trail = [];
      }
      state.running = true;
      state.lastTs = null;
      updatePlayPauseButton();
      requestAnimationFrame(tick);
    }

    function pauseSimulation() {
      state.running = false;
      state.lastTs = null;
      updatePlayPauseButton();
      updateResults();
      draw();
    }

    function tick(ts) {
      if (!state.running) return;
      if (state.lastTs == null) state.lastTs = ts;
      const dt = (ts - state.lastTs) / 1000;
      state.lastTs = ts;
      const c = calc();
      if (c.crossable) {
        state.elapsed += dt * state.playback;
        if (state.elapsed >= c.time) {
          state.elapsed = c.time;
          state.running = false;
          state.justArrived = true;
          updatePlayPauseButton();
        }
      }
      updateResults();
      draw();
      if (state.running) requestAnimationFrame(tick);
    }

    function beginCanvasDrag(evt, mode) {
      if (!state.interaction) return;
      state.running = false;
      state.draggingBoat = true;
      state.dragMode = mode;
      state.lastTs = null;
      canvas.classList.add('dragging');
      dragTargets.boat.classList.add('dragging');
      dragTargets.vector.classList.add('dragging');
      state.dragCaptureTarget = evt.currentTarget || canvas;
      try { state.dragCaptureTarget.setPointerCapture(evt.pointerId); } catch (e) {}
      window.addEventListener('pointermove', handleDragMove, { passive: false });
      window.addEventListener('pointerup', handleDragEnd);
      window.addEventListener('pointercancel', handleDragEnd);
      evt.preventDefault();
      evt.stopPropagation();
    }

    function handleDragStart(evt) {
      if (!state.interaction) return;
      const p = getCanvasPoint(evt);
      const hitRadius = evt.pointerType === 'touch' ? 28 : 18;
      const hitTip = Math.hypot(p.x - state.interaction.handleX, p.y - state.interaction.handleY) <= hitRadius;
      const hitBoat = Math.hypot(p.x - state.interaction.boatX, p.y - state.interaction.boatY) <= (evt.pointerType === 'touch' ? 30 : 20);
      if (!hitTip && !hitBoat) return;
      beginCanvasDrag(evt, hitBoat && !hitTip ? 'boat-position' : 'boat-vector');
    }

    function handleDragMove(evt) {
      if (!state.draggingBoat || !state.interaction) return;
      const p = getCanvasPoint(evt);
      if (state.dragMode === 'boat-position') {
        const tr = state.interaction.transform || getTransform();
        state.startX = clamp(canvasToWorldX(p.x, tr), tr.xMin + 2, tr.xMax - 2);
        markActivePreset('');
        recalc(true);
        evt.preventDefault();
        return;
      }
      const dx = p.x - state.interaction.originX;
      const dy = p.y - state.interaction.originY;
      const compX = dx / state.interaction.vectorScale;
      const compY = -dy / state.interaction.vectorScale;
      let boat = clamp(Math.hypot(compX, compY), Number(refs.boatRange.min), Number(refs.boatRange.max));
      let angle = Math.atan2(-compX, compY) * 180 / Math.PI;
      angle = clamp(angle, Number(refs.angleRange.min), Number(refs.angleRange.max));
      state.boat = boat;
      state.angleDeg = angle;
      markActivePreset('');
      syncInputsFromState();
      recalc(true);
      evt.preventDefault();
    }

    function handleDragEnd(evt) {
      if (!state.draggingBoat) return;
      state.draggingBoat = false;
      state.dragMode = null;
      canvas.classList.remove('dragging');
      dragTargets.boat.classList.remove('dragging');
      dragTargets.vector.classList.remove('dragging');
      try { (state.dragCaptureTarget || canvas).releasePointerCapture(evt.pointerId); } catch (e) {}
      state.dragCaptureTarget = null;
      window.removeEventListener('pointermove', handleDragMove);
      window.removeEventListener('pointerup', handleDragEnd);
      window.removeEventListener('pointercancel', handleDragEnd);
    }

    linkPair(refs.currentRange, refs.currentNumber, 'current');
    linkPair(refs.boatRange, refs.boatNumber, 'boat');
    linkPair(refs.angleRange, refs.angleNumber, 'angleDeg');
    linkPair(refs.widthRange, refs.widthNumber, 'width');
    linkPair(refs.speedRange, refs.speedNumber, 'playback');

    toggleButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const key = button.dataset.toggle;
        state[key] = !state[key];
        if (key === 'showTrail' && !state.showTrail) state.trail = [];
        updateToggleButtons();
        draw();
      });
    });

    document.getElementById('straightBtn').addEventListener('click', () => {
      state.angleDeg = 0;
      markActivePreset('');
      syncInputsFromState();
      recalc(true);
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      const c = calc();
      if (!c.cancelPossible) {
        alert('この条件では真向かいの対岸に着く向きは作れません。');
        return;
      }
      state.angleDeg = Number(c.cancelAngle.toFixed(1));
      markActivePreset('');
      syncInputsFromState();
      recalc(true);
    });

    document.getElementById('textbookBtn').addEventListener('click', () => {
      resetActivePreset();
    });

    document.querySelectorAll('.preset-btn').forEach((button) => {
      button.addEventListener('click', () => applyPreset(button.dataset.preset));
    });

    playPauseBtn.addEventListener('click', () => {
      if (state.running) {
        pauseSimulation();
      } else {
        startSimulation();
      }
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      resetSimulation();
    });

    dragTargets.boat.addEventListener('pointerdown', (evt) => beginCanvasDrag(evt, 'boat-position'));
    dragTargets.vector.addEventListener('pointerdown', (evt) => beginCanvasDrag(evt, 'boat-vector'));

    canvas.addEventListener('pointerdown', handleDragStart);

    syncInputsFromState();
    updateLabels();
    updatePlayPauseButton();
    updateToggleButtons();
    recalc(true);
  </script>
</body>
</html>
