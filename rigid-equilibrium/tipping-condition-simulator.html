};
const controls=document.getElementById('controls'),guide=document.getElementById('guide'),modeNote=document.getElementById('modeNote'),modeChip=document.getElementById('modeChip'),resultChip=document.getElementById('resultChip'),orderChip=document.getElementById('orderChip'),statusText=document.getElementById('statusText'),sceneNote=document.getElementById('sceneNote'),c1t=document.getElementById('c1t'),c2t=document.getElementById('c2t'),v1=document.getElementById('v1'),v2=document.getElementById('v2'),n1=document.getElementById('n1'),n2=document.getElementById('n2'),judge=document.getElementById('judge'),judgeNote=document.getElementById('judgeNote'),explain=document.getElementById('explain'),formula=document.getElementById('formula');
document.getElementById('lead').textContent=TEXT.lead;document.getElementById('legend1').textContent=TEXT.legend1;document.getElementById('legend2').textContent=TEXT.legend2;document.getElementById('legend3').textContent=TEXT.legend3;document.getElementById('legend4').textContent=TEXT.legend4;
const sceneCanvas=document.getElementById('sceneCanvas'),sceneCtx=sceneCanvas.getContext('2d');const barCanvas=document.getElementById('barCanvas'),barCtx=barCanvas.getContext('2d');
const G=9.8,MASS=1,AREA=2.4;const COLORS={horizontal:'#2f7e99',vertical:'#446b48',oblique:'#d7653c',warn:'#a64a2e',safe:'#2c7d9d',guide:'rgba(22,49,59,.22)',guideSoft:'rgba(22,49,59,.14)'};
const state={mode:'horizontal',horizontal:{ratio:2,tension:5,pullHeightRatio:.9,mu:.7},slope:{angleDeg:18,mu:.42},phase:0};
const controlDefs={horizontal:[['ratio','\u9ad8\u3055\u3068\u5e95\u8fba\u306e\u6bd4',.5,2.2,.01,2,''],['tension','\u5f35\u529b',0,16,.1,1,' N'],['pullHeightRatio','\u5f35\u529b\u306e\u4f5c\u7528\u70b9\u306e\u9ad8\u3055',.15,.95,.01,2,' H'],['mu','\u6469\u64e6\u4fc2\u6570',0,1.2,.01,2,'']],slope:[['angleDeg','\u659c\u9762\u306e\u89d2\u5ea6',0,60,.1,1,' \u00b0'],['mu','\u6469\u64e6\u4fc2\u6570',0,1.2,.01,2,'']]};
const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));const fmt=(v,d=1)=>Number(v).toFixed(d);const dimsFromRatio=r=>({width:AREA/Math.sqrt(r),height:AREA*Math.sqrt(r)});
function horizontalData(){const dm=dimsFromRatio(state.horizontal.ratio),W=dm.width,H=dm.height,T=state.horizontal.tension,mu=state.horizontal.mu,h=clamp(state.horizontal.pullHeightRatio*H,.05,H-.05),mg=MASS*G,N=mg,fNeed=T,fMax=mu*N,tip=(mg*W)/(2*h),lineX=W/2+(h*T)/mg,reactionX=clamp(lineX,0,W),mW=mg*W/2,mT=T*h;let result='\u9759\u6b62';if(Math.abs(fMax-tip)<.05&&T>=Math.min(fMax,tip))result='\u5883\u754c';else if(T<Math.min(fMax,tip))result='\u9759\u6b62';else result=fMax<tip?'\u3059\u3079\u308b':'\u8ee2\u5012';return{W,H,T,mu,h,mg,N,fNeed,fMax,tip,lineX,reactionX,mW,mT,result}}
function slopeData(){const W=2.5,H=1.9,th=state.slope.angleDeg*Math.PI/180,mu=state.slope.mu,mg=MASS*G,N=mg*Math.cos(th),down=mg*Math.sin(th),slide=Math.atan(mu),tip=Math.atan(W/H),shift=clamp((H/2)*Math.tan(th),-W/2,W/2);let result='\u9759\u6b62';if(Math.abs(slide-tip)<.01&&th>=Math.min(slide,tip))result='\u5883\u754c';else if(th<Math.min(slide,tip))result='\u9759\u6b62';else result=slide<tip?'\u3059\u3079\u308b':'\u8ee2\u5012';return{W,H,th,mu,mg,N,down,slide,tip,shift,result}}
const currentData=()=>state.mode==='horizontal'?horizontalData():slopeData();
function renderControls(){const defs=controlDefs[state.mode];controls.innerHTML=defs.map(([key,label,min,max,step,digit,unit])=>{const value=state[state.mode][key];const shown=fmt(value,digit)+unit;return `<label class="range-row"><div class="range-head"><strong>${label}</strong><span data-value="${key}">${shown}</span></div><input type="range" min="${min}" max="${max}" step="${step}" value="${value}" data-key="${key}" data-digit="${digit}" data-unit="${unit}"></label>`;}).join('');controls.querySelectorAll('[data-key]').forEach(input=>input.addEventListener('input',e=>{const key=e.target.dataset.key;state[state.mode][key]=Number(e.target.value);const valueNode=controls.querySelector(`[data-value="${key}"]`);if(valueNode)valueNode.textContent=fmt(state[state.mode][key],Number(e.target.dataset.digit))+e.target.dataset.unit;}));}
function syncText(){document.querySelectorAll('[data-mode]').forEach(btn=>{btn.classList.toggle('active',btn.dataset.mode===state.mode);btn.textContent=btn.dataset.mode==='horizontal'?TEXT.modeHorizontalLong:TEXT.modeSlopeLong;});if(state.mode==='horizontal'){modeChip.textContent=TEXT.modeHorizontal;modeNote.textContent=TEXT.modeNoteH;statusText.textContent=TEXT.statusLeadH;sceneNote.textContent=TEXT.sceneNoteH;guide.innerHTML=TEXT.guideH.map(v=>`<div>${v}</div>`).join('');}else{modeChip.textContent=TEXT.modeSlope;modeNote.textContent=TEXT.modeNoteS;statusText.textContent=TEXT.statusLeadS;sceneNote.textContent=TEXT.sceneNoteS;guide.innerHTML=TEXT.guideS.map(v=>`<div>${v}</div>`).join('');}sceneNote.style.display=sceneNote.textContent?'block':'none';}
function resizeCanvas(canvas,ctx){const rect=canvas.getBoundingClientRect(),dpr=window.devicePixelRatio||1;canvas.width=Math.round(rect.width*dpr);canvas.height=Math.round(rect.height*dpr);ctx.setTransform(dpr,0,0,dpr,0,0)}
function drawArrow(ctx,x1,y1,x2,y2,color,width,label,lx=0,ly=0){const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);if(len<.001)return;const ux=dx/len,uy=dy/len,nx=-uy,ny=ux;ctx.save();ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=width;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-ux*14+nx*7,y2-uy*14+ny*7);ctx.lineTo(x2-ux*14-nx*7,y2-uy*14-ny*7);ctx.closePath();ctx.fill();if(label){ctx.font="700 13px 'Yu Gothic UI', sans-serif";ctx.textAlign='center';ctx.fillText(label,(x1+x2)/2+lx,(y1+y2)/2+ly)}ctx.restore();}
function drawBlock(ctx,cx,cy,w,h,a){ctx.save();ctx.translate(cx,cy);ctx.rotate(a);ctx.fillStyle='rgba(22,49,59,.05)';ctx.fillRect(-w/2+5,-h/2+2,w,h-2);const g=ctx.createLinearGradient(-w/2,-h/2,w/2,h/2);g.addColorStop(0,'#eef1f3');g.addColorStop(1,'#c8d0d5');ctx.fillStyle=g;ctx.strokeStyle='#7d8c93';ctx.lineWidth=2;ctx.beginPath();ctx.rect(-w/2,-h/2,w,h);ctx.fill();ctx.stroke();ctx.restore();}
function drawGhostBlock(ctx,cx,cy,w,h,a){ctx.save();ctx.globalAlpha=.28;ctx.translate(cx,cy);ctx.rotate(a);ctx.fillStyle='#ffffff';ctx.strokeStyle='rgba(153,100,59,.45)';ctx.lineWidth=2;ctx.beginPath();ctx.rect(-w/2,-h/2,w,h);ctx.fill();ctx.stroke();ctx.restore();}
function drawActionLine(ctx,x,y,dx,dy,color,extent){const len=Math.hypot(dx,dy);if(len<.001)return;const ux=dx/len,uy=dy/len;ctx.save();ctx.strokeStyle=color;ctx.lineWidth=2.4;ctx.setLineDash([8,6]);ctx.beginPath();ctx.moveTo(x-ux*extent,y-uy*extent);ctx.lineTo(x+ux*extent,y+uy*extent);ctx.stroke();ctx.restore();}
function forceColor(dx,dy){if(Math.abs(dy)<=1.5)return COLORS.horizontal;if(Math.abs(dx)<=1.5)return COLORS.vertical;return COLORS.oblique;}
function drawGuideSegment(ctx,x1,y1,x2,y2){ctx.save();ctx.strokeStyle=COLORS.guide;ctx.lineWidth=1.8;ctx.setLineDash([5,4]);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore();}
function drawHorizontal(d){
const w=sceneCanvas.clientWidth,h=sceneCanvas.clientHeight,splitX=w*.59,groundY=h*.76,ppm=Math.min(splitX*.215,92),bw=d.W*ppm,bh=d.H*ppm,cx=splitX*.42,cy=groundY-bh/2,left=cx-bw/2,right=cx+bw/2,pullY=groundY-d.h*ppm,attachX=right,ix=cx,iy=pullY,forceScale=8.4,tx=d.T*forceScale,gy=d.mg*forceScale,resultEndX=ix+tx,resultEndY=iy+gy,floorX=ix+((groundY-iy)*tx/gy),supportX=clamp(floorX,left,right),supportY=groundY,over=floorX<left||floorX>right,reactionDx=-tx,reactionDy=-gy,normalLen=d.N*forceScale,frictionLen=d.fNeed*forceScale;

2\u306b\u6cbf\u3063\u3066\u4e0b\u3078\u5f15\u304f\u91cd\u529b\u6210\u5206\u3067\u3059\u3002';n2.textContent='\u3053\u308c\u3092\u8d85\u3048\u308b\u3068\u3001\u3059\u3079\u308a\u59cb\u3081\u307e\u3059\u3002';explain.textContent=d.slide<d.tip?'\u3053\u306e\u8a2d\u5b9a\u3067\u306f\u3001\u89d2\u3092\u8d8a\u3048\u308b\u524d\u306b\u3059\u3079\u308a\u6761\u4ef6\u304c\u5148\u306b\u6210\u308a\u7acb\u3061\u307e\u3059\u3002':d.tip<d.slide?'\u3053\u306e\u8a2d\u5b9a\u3067\u306f\u3001\u3059\u3079\u308a\u51fa\u3059\u524d\u306b\u8ee2\u5012\u6761\u4ef6\u304c\u5148\u306b\u6210\u308a\u7acb\u3061\u307e\u3059\u3002':'\u3059\u3079\u308a\u3068\u8ee2\u5012\u306e\u5883\u754c\u304c\u307b\u307c\u540c\u3058\u3067\u3059\u3002';formula.innerHTML=`<div>\u3059\u3079\u308a\u5883\u754c <i>\\theta = ${fmt(d.slide*180/Math.PI)}^\\circ</i></div><div>\u8ee2\u5012\u5883\u754c <i>\\theta = ${fmt(d.tip*180/Math.PI)}^\\circ</i></div><div>\u4eca\u306e\u89d2\u5ea6 <i>\\theta = ${fmt(d.th*180/Math.PI)}^\\circ</i></div><div>\u5782\u76f4\u6297\u529b <i>N = ${fmt(d.N)}\\,\\mathrm{N}</i></div>`;orderChip.textContent=d.slide<d.tip?'\u3059\u3079\u308a\u6761\u4ef6\u304c\u5148':d.tip<d.slide?'\u8ee2\u5012\u6761\u4ef6\u304c\u5148':'\u5883\u754c\u304c\u307b\u307c\u540c\u3058';}judge.textContent=d.result;judgeNote.textContent=d.result==='\u9759\u6b62'?'\u307e\u3060\u3069\u3061\u3089\u306e\u6761\u4ef6\u3082\u8d85\u3048\u3066\u3044\u307e\u305b\u3093\u3002':d.result==='\u3059\u3079\u308b'?'\u5148\u306b\u3059\u3079\u308a\u6761\u4ef6\u304c\u6210\u308a\u7acb\u3063\u3066\u3044\u307e\u3059\u3002':d.result==='\u8ee2\u5012'?'\u5148\u306b\u8ee2\u5012\u6761\u4ef6\u304c\u6210\u308a\u7acb\u3063\u3066\u3044\u307e\u3059\u3002':'\u3059\u3079\u308a\u3068\u8ee2\u5012\u306e\u6761\u4ef6\u304c\u307b\u307c\u540c\u6642\u3067\u3059\u3002';resultChip.textContent=d.result;resultChip.className=`chip ${d.result==='\u9759\u6b62'?'good':'warn'}`;}
function render(){state.phase+=1/60;const d=currentData();updateSummary(d);if(state.mode==='horizontal'){drawHorizontal(d);drawBarHorizontal(d)}else{drawSlope(d);drawBarSlope(d)}requestAnimationFrame(render)}
function resizeAll(){resizeCanvas(sceneCanvas,sceneCtx);resizeCanvas(barCanvas,barCtx)}
document.querySelectorAll('[data-mode]').forEach(btn=>btn.addEventListener('click',()=>{state.mode=btn.dataset.mode;renderControls();syncText()}));window.addEventListener('resize',resizeAll);renderControls();syncText();resizeAll();render();
