<style>

.top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:flex-start;padding:12px 14px;border-radius:22px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(47,126,153,.07),rgba(255,255,255,.88))}.status{display:flex;gap:8px;flex-wrap:wrap}.chip.good{color:#2d7b67;background:rgba(61,124,105,.12)}.chip.warn{color:var(--warn);background:rgba(166,74,46,.12)}
.scene,.bar{padding:10px;border:1px solid var(--line);border-radius:22px;background:var(--card)}.view{position:relative;border-radius:18px;overflow:hidden;border:1px solid rgba(22,49,59,.08);background:linear-gradient(180deg,#fff,#faf4ec)}.bar .view{height:132px}canvas{display:block;width:100%;height:100%}#sceneCanvas{min-height:420px}#barCanvas{min-height:132px}.overlay{position:absolute;left:12px;right:12px;bottom:12px;padding:8px 10px;border-radius:16px;background:rgba(255,255,255,.94);border:1px solid rgba(22,49,59,.08);font-size:.9rem}.card{display:grid;gap:4px;padding:12px 14px}.card strong{font-size:.88rem;color:var(--muted)}.card span{font-size:1.06rem;font-weight:800}.wide{grid-column:1 / -1}.legend-item{gap:8px;padding:5px 10px;font-size:.88rem;min-height:34px}.sw{width:14px;height:14px;border-radius:50%}.sw.weight{background:var(--horizontal)}.sw.pull{background:var(--vertical)}.sw.contact{background:var(--oblique)}.sw.warn{background:var(--warn)}

  </section>
</main>
<script>
const TEXT={
  lead:'\u3059\u3079\u308a\u51fa\u3059\u6761\u4ef6\u3068\u3001\u8ee2\u5012\u3057\u59cb\u3081\u308b\u6761\u4ef6\u3092\u540c\u3058\u753b\u9762\u3067\u6bd4\u3079\u307e\u3059\u3002\u529b\u3092\u66f8\u304d\u3001\u4f5c\u7528\u7dda\u3068\u6469\u64e6\u306e\u9650\u754c\u3092\u9806\u306b\u78ba\u304b\u3081\u307e\u3059\u3002',
  modeHorizontal:'\u6c34\u5e73\u9762',modeSlope:'\u659c\u9762',
  modeHorizontalLong:'\u6c34\u5e73\u9762\u4e0a\u306e\u7269\u4f53',modeSlopeLong:'\u659c\u9762\u4e0a\u306e\u7269\u4f53',
  statusLeadH:'',
  statusLeadS:'',
  modeNoteH:'\u5f35\u529b\u3092\u5c11\u3057\u305a\u3064\u5927\u304d\u304f\u3057\u3066\u3044\u304f\u3068\u304d\u3001\u3059\u3079\u308a\u3068\u8ee2\u5012\u306e\u3069\u3061\u3089\u304c\u5148\u306b\u8d77\u3053\u308b\u304b\u3092\u6bd4\u3079\u307e\u3059\u3002',
  modeNoteS:'',
  sceneNoteH:'',
  sceneNoteS:'',
  legend1:'\u6c34\u5e73\u65b9\u5411\u306e\u529b',legend2:'\u925b\u76f4\u65b9\u5411\u306e\u529b',legend3:'\u659c\u3081\u65b9\u5411\u306e\u529b',legend4:'\u5883\u754c\u6761\u4ef6',
  guideH:['1. \u91cd\u529b\u3068\u5f35\u529b\u306e\u5408\u529b\u306e\u4f5c\u7528\u7dda\u304c\u3001\u63a5\u5730\u9762\u306e\u7aef\u3092\u8d8a\u3048\u308b\u304b\u3092\u898b\u307e\u3059\u3002','2. \u73fe\u5728\u306e\u9759\u6b62\u6469\u64e6\u529b\u304c\u3001\u6700\u5927\u9759\u6b62\u6469\u64e6\u529b\u3092\u8d85\u3048\u308b\u304b\u3082\u540c\u6642\u306b\u6bd4\u3079\u307e\u3059\u3002'],
  guideS:['1. \u91cd\u529b\u3092\u659c\u9762\u65b9\u5411\u3068\u659c\u9762\u5782\u76f4\u65b9\u5411\u306b\u5206\u3051\u307e\u3059\u3002','2. \u659c\u9762\u65b9\u5411\u306e\u91cd\u529b\u6210\u5206\u3068\u3001\u6700\u5927\u9759\u6b62\u6469\u64e6\u529b\u3092\u6bd4\u3079\u307e\u3059\u3002','3. \u4f5c\u7528\u7dda\u304c\u4e0b\u5074\u306e\u89d2\u3092\u8d8a\u3048\u308b\u304b\u3082\u540c\u6642\u306b\u6bd4\u3079\u307e\u3059\u3002']
};
const controls=document.getElementById('controls'),guide=document.getElementById('guide'),modeNote=document.getElementById('modeNote'),sceneNote=document.getElementById('sceneNote'),c1t=document.getElementById('c1t'),c2t=document.getElementById('c2t'),c3t=document.getElementById('c3t'),c4t=document.getElementById('c4t'),v1=document.getElementById('v1'),v2=document.getElementById('v2'),v3=document.getElementById('v3'),v4=document.getElementById('v4'),n1=document.getElementById('n1'),n2=document.getElementById('n2'),n3=document.getElementById('n3'),n4=document.getElementById('n4'),explain=document.getElementById('explain'),formula=document.getElementById('formula');
document.querySelector('.eyebrow').textContent='\u529b\u5b66 / \u525b\u4f53\u306e\u3064\u308a\u3042\u3044';
document.getElementById('lead').textContent=TEXT.lead;
const sceneCanvas=document.getElementById('sceneCanvas'),sceneCtx=sceneCanvas.getContext('2d');const barCanvas=document.getElementById('barCanvas'),barCtx=barCanvas.getContext('2d');
const G=9.8,MASS=1,AREA=2.0;const COLORS={horizontal:'#2f7e99',vertical:'#446b48',oblique:'#d7653c',warn:'#a64a2e',safe:'#2c7d9d',guide:'rgba(22,49,59,.22)',guideSoft:'rgba(22,49,59,.14)'};
const state={mode:'horizontal',horizontal:{ratio:1,tension:4,pullHeight:2,mu:.7},slope:{ratio:1,angleDeg:30,frictionAngleDeg:50},phase:0};
const controlDefs={horizontal:[['ratio','\u9ad8\u3055\u3068\u5e95\u8fba\u306e\u6bd4',.5,2.2,.01,2,''],['tension','\u5f35\u529b',0,16,.1,1,' N'],['pullHeight','\u5f35\u529b\u306e\u4f5c\u7528\u70b9\u306e\u9ad8\u3055',0,2,.01,2,' m'],['mu','\u6469\u64e6\u4fc2\u6570',0,1.2,.01,2,'']],slope:[['ratio','\u9ad8\u3055\u3068\u5e95\u8fba\u306e\u6bd4',.5,2.2,.01,2,''],['angleDeg','\u659c\u9762\u306e\u89d2\u5ea6',0,60,.1,1,' \u00b0'],['frictionAngleDeg','\u6469\u64e6\u4fc2\u6570 \u03bc',0,65,.1,1,' \u00b0']]};
const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));const fmt=(v,d=1)=>Number(v).toFixed(d);const dimsFromRatio=r=>({width:AREA/Math.sqrt(r),height:AREA*Math.sqrt(r)});
function horizontalData(){const dm=dimsFromRatio(state.horizontal.ratio),W=dm.width,H=dm.height,T=state.horizontal.tension,mu=state.horizontal.mu,h=clamp(state.horizontal.pullHeight,.05,Math.min(2,H-.05)),mg=MASS*G,N=mg,fNeed=T,fMax=mu*N,tip=(mg*W)/(2*h),lineX=W/2+(h*T)/mg,reactionX=clamp(lineX,0,W),mW=mg*W/2,mT=T*h;let result='\u9759\u6b62';if(Math.abs(fMax-tip)<.05&&T>=Math.min(fMax,tip))result='\u5883\u754c';else if(T<Math.min(fMax,tip))result='\u9759\u6b62';else result=fMax<tip?'\u3059\u3079\u308b':'\u8ee2\u5012';return{W,H,T,mu,h,mg,N,fNeed,fMax,tip,lineX,reactionX,mW,mT,result}}
function slopeData(){const dm=dimsFromRatio(state.slope.ratio),W=dm.width,H=dm.height,th=state.slope.angleDeg*Math.PI/180,frictionAngle=state.slope.frictionAngleDeg*Math.PI/180,mu=Math.tan(frictionAngle),mg=MASS*G,N=mg*Math.cos(th),down=mg*Math.sin(th),slide=frictionAngle,tip=Math.atan(W/H),shift=clamp((H/2)*Math.tan(th),-W/2,W/2);let result='\u9759\u6b62';if(Math.abs(th)<1e-6||Math.abs(down)<1e-6)result='\u9759\u6b62';else if(Math.abs(slide-tip)<.01&&th>=Math.min(slide,tip))result='\u5883\u754c';else if(th<Math.min(slide,tip))result='\u9759\u6b62';else result=slide<tip?'\u3059\u3079\u308b':'\u8ee2\u5012';return{W,H,th,mu,frictionAngle,mg,N,down,slide,tip,shift,result}}
const currentData=()=>state.mode==='horizontal'?horizontalData():slopeData();
function renderControls(){const defs=controlDefs[state.mode];controls.innerHTML=defs.map(([key,label,min,max,step,digit,unit])=>{const value=state[state.mode][key];const shown=key==='frictionAngleDeg'?`\u03bc = tan \u03b8\u2080  (\u03b8\u2080 = ${fmt(value,digit)}${unit})`:`${fmt(value,digit)}${unit}`;return `<label class="range-row"><div class="range-head"><strong>${label}</strong><span data-value="${key}">${shown}</span></div><input type="range" min="${min}" max="${max}" step="${step}" value="${value}" data-key="${key}" data-digit="${digit}" data-unit="${unit}"></label>`;}).join('');controls.querySelectorAll('[data-key]').forEach(input=>input.addEventListener('input',e=>{const key=e.target.dataset.key;state[state.mode][key]=Number(e.target.value);const valueNode=controls.querySelector(`[data-value="${key}"]`);if(valueNode){valueNode.textContent=key==='frictionAngleDeg'?`\u03bc = tan \u03b8\u2080  (\u03b8\u2080 = ${fmt(state[state.mode][key],Number(e.target.dataset.digit))}${e.target.dataset.unit})`:`${fmt(state[state.mode][key],Number(e.target.dataset.digit))}${e.target.dataset.unit}`;}}));}
function syncText(){document.querySelectorAll('[data-mode]').forEach(btn=>{btn.classList.toggle('active',btn.dataset.mode===state.mode);btn.textContent=btn.dataset.mode==='horizontal'?TEXT.modeHorizontalLong:TEXT.modeSlopeLong;});if(state.mode==='horizontal'){modeNote.textContent=TEXT.modeNoteH;sceneNote.textContent=TEXT.sceneNoteH;guide.innerHTML=TEXT.guideH.map(v=>`<div>${v}</div>`).join('');}else{modeNote.textContent=TEXT.modeNoteS;sceneNote.textContent=TEXT.sceneNoteS;guide.innerHTML=TEXT.guideS.map(v=>`<div>${v}</div>`).join('');}sceneNote.style.display=sceneNote.textContent?'block':'none';}
function resizeCanvas(canvas,ctx){const rect=canvas.getBoundingClientRect(),dpr=window.devicePixelRatio||1;canvas.width=Math.round(rect.width*dpr);canvas.height=Math.round(rect.height*dpr);ctx.setTransform(dpr,0,0,dpr,0,0)}
function drawArrow(ctx,x1,y1,x2,y2,color,width,label,lx=0,ly=0){const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);if(len<.001)return;const ux=dx/len,uy=dy/len,nx=-uy,ny=ux;ctx.save();ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=width;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-ux*14+nx*7,y2-uy*14+ny*7);ctx.lineTo(x2-ux*14-nx*7,y2-uy*14-ny*7);ctx.closePath();ctx.fill();if(label){ctx.font="700 13px 'Yu Gothic UI', sans-serif";ctx.textAlign='center';ctx.fillText(label,(x1+x2)/2+lx,(y1+y2)/2+ly)}ctx.restore();}
function drawBlock(ctx,cx,cy,w,h,a){ctx.save();ctx.translate(cx,cy);ctx.rotate(a);ctx.fillStyle='rgba(22,49,59,.05)';ctx.fillRect(-w/2+5,-h/2+2,w,h-2);const g=ctx.createLinearGradient(-w/2,-h/2,w/2,h/2);g.addColorStop(0,'#eef1f3');g.addColorStop(1,'#c8d0d5');ctx.fillStyle=g;ctx.strokeStyle='#7d8c93';ctx.lineWidth=2;ctx.beginPath();ctx.rect(-w/2,-h/2,w,h);ctx.fill();ctx.stroke();ctx.restore();}
function drawGhostBlock(ctx,cx,cy,w,h,a){ctx.save();ctx.globalAlpha=.28;ctx.translate(cx,cy);ctx.rotate(a);ctx.fillStyle='#ffffff';ctx.strokeStyle='rgba(153,100,59,.45)';ctx.lineWidth=2;ctx.beginPath();ctx.rect(-w/2,-h/2,w,h);ctx.fill();ctx.stroke();ctx.restore();}
function drawActionLine(ctx,x,y,dx,dy,color,extent){const len=Math.hypot(dx,dy);if(len<.001)return;const ux=dx/len,uy=dy/len;ctx.save();ctx.strokeStyle=color;ctx.lineWidth=2.4;ctx.setLineDash([8,6]);ctx.beginPath();ctx.moveTo(x-ux*extent,y-uy*extent);ctx.lineTo(x+ux*extent,y+uy*extent);ctx.stroke();ctx.restore();}
function forceColor(dx,dy){if(Math.abs(dy)<=1.5)return COLORS.horizontal;if(Math.abs(dx)<=1.5)return COLORS.vertical;return COLORS.oblique;}
function drawGuideSegment(ctx,x1,y1,x2,y2){ctx.save();ctx.strokeStyle=COLORS.guide;ctx.lineWidth=1.8;ctx.setLineDash([5,4]);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore();}
function drawHorizontal(d){
const w=sceneCanvas.clientWidth,h=sceneCanvas.clientHeight,splitX=w*.59,groundY=h*.76,ppm=Math.min(splitX*.215,92),bw=d.W*ppm,bh=d.H*ppm,cx=splitX*.42,cy=groundY-bh/2,left=cx-bw/2,right=cx+bw/2,pullY=groundY-d.h*ppm,attachX=right,ix=cx,iy=pullY,forceScale=8.4,tx=d.T*forceScale,weightLen=d.mg*forceScale,gy=weightLen,resultEndX=ix+tx,resultEndY=iy+gy,floorX=ix+((groundY-iy)*tx/gy),supportX=clamp(floorX,left,right),supportY=groundY,over=floorX<left||floorX>right,reactionDx=-tx,reactionDy=-gy,normalLen=weightLen,frictionLen=d.fNeed*forceScale;
sceneCtx.clearRect(0,0,w,h);
sceneCtx.fillStyle='#f7f1e8';
sceneCtx.fillRect(0,0,w,h);
sceneCtx.fillStyle='rgba(47,126,153,.04)';
sceneCtx.fillRect(splitX,0,w-splitX,h);
sceneCtx.strokeStyle='rgba(22,49,59,.08)';
sceneCtx.lineWidth=1;
sceneCtx.beginPath();
sceneCtx.moveTo(splitX,18);
sceneCtx.lineTo(splitX,h-18);
sceneCtx.stroke();
sceneCtx.fillStyle='rgba(22,49,59,.58)';
sceneCtx.font="700 14px 'Yu Gothic UI', sans-serif";
sceneCtx.textAlign='left';
sceneCtx.fillText('\u56fa\u5b9a\u3057\u305f\u56f3',22,28);
sceneCtx.fillText('\u5f35\u529b\u3092\u4eca\u306e\u5024\u307e\u3067\u5927\u304d\u304f\u3057\u3066\u3044\u304f\u3068',splitX+22,28);
sceneCtx.fillStyle='rgba(47,126,153,.05)';
sceneCtx.fillRect(left,groundY-5,bw,10);
sceneCtx.fillStyle='rgba(22,49,59,.55)';
sceneCtx.font="12px 'Yu Gothic UI', sans-serif";
sceneCtx.textAlign='center';
drawBlock(sceneCtx,cx,cy,bw,bh,0);

sceneCtx.strokeStyle='rgba(47,126,153,.34)';
sceneCtx.lineWidth=2;
sceneCtx.beginPath();
sceneCtx.moveTo(attachX,pullY);
sceneCtx.lineTo(attachX+78,pullY);
sceneCtx.stroke();

drawArrow(sceneCtx,cx,cy,cx,cy+92,forceColor(0,92),3.5,'',0,0);
drawArrow(sceneCtx,attachX,pullY,attachX+tx,pullY,forceColor(tx,0),3.5,'',0,0);

sceneCtx.save();
sceneCtx.globalAlpha=.3;
drawArrow(sceneCtx,ix,iy,ix+tx,iy,forceColor(tx,0),2.6,'',0,0);
drawArrow(sceneCtx,ix,iy,ix,iy+gy,forceColor(0,gy),2.6,'',0,0);
sceneCtx.restore();
drawGuideSegment(sceneCtx,ix+tx,iy,resultEndX,resultEndY);
drawGuideSegment(sceneCtx,ix,iy+gy,resultEndX,resultEndY);
drawArrow(sceneCtx,ix,iy,resultEndX,resultEndY,forceColor(tx,gy),4.2,'',0,0);

drawGuideSegment(sceneCtx,ix,iy,floorX,groundY);

drawArrow(sceneCtx,supportX,supportY,supportX,supportY-normalLen,forceColor(0,-normalLen),2.8,'',0,0);
drawArrow(sceneCtx,supportX,supportY,supportX-frictionLen,supportY,forceColor(-frictionLen,0),2.8,'',0,0);

sceneCtx.save();
sceneCtx.globalAlpha=.3;
drawArrow(sceneCtx,supportX,supportY,supportX-frictionLen,supportY,forceColor(-frictionLen,0),2.4,'',0,0);
drawArrow(sceneCtx,supportX,supportY,supportX,supportY-normalLen,forceColor(0,-normalLen),2.4,'',0,0);
sceneCtx.restore();
drawGuideSegment(sceneCtx,supportX-frictionLen,supportY,supportX+reactionDx,supportY+reactionDy);
drawGuideSegment(sceneCtx,supportX,supportY-normalLen,supportX+reactionDx,supportY+reactionDy);
drawArrow(sceneCtx,supportX,supportY,supportX+reactionDx,supportY+reactionDy,forceColor(reactionDx,reactionDy),4.2,'',0,0);

sceneCtx.fillStyle=COLORS.horizontal;
sceneCtx.beginPath();
sceneCtx.arc(attachX,pullY,5,0,Math.PI*2);
sceneCtx.fill();
sceneCtx.fillStyle='rgba(166,74,46,.12)';
sceneCtx.beginPath();
sceneCtx.arc(over?(floorX<left?left:right):floorX,groundY,16,0,Math.PI*2);
sceneCtx.fill();
sceneCtx.fillStyle=over?COLORS.warn:'#2d7b67';
sceneCtx.beginPath();
sceneCtx.arc(supportX,supportY,5,0,Math.PI*2);
sceneCtx.fill();

  n1.textContent='\u73fe\u5728\u3001\u659c\u9762\u3067\u91e3\u308a\u5408\u3046\u305f\u3081\u306b\u5fc5\u8981\u306a\u9759\u6b62\u6469\u64e6\u529b\u3067\u3059\u3002';
  n2.textContent='\u3053\u308c\u3092\u8d85\u3048\u308b\u3068\u3001\u3059\u3079\u308a\u59cb\u3081\u307e\u3059\u3002';
  n3.textContent='\u03bc = tan \u03b8\u2080 \u3092\u6e80\u3059\u3001\u3059\u3079\u308a\u59cb\u3081\u308b\u89d2\u5ea6 \u03b8\u2080 \u3067\u3059\u3002';
  n4.textContent='tan \u03b8\' = (\u5e95\u8fba)/(\u9ad8\u3055) \u3092\u6e80\u305f\u3059\u89d2\u5ea6\u3067\u3059\u3002';
  explain.textContent=d.slide<d.tip?'\u3053\u306e\u8a2d\u5b9a\u3067\u306f\u3001\u6469\u64e6\u89d2\u306b\u5bfe\u5fdc\u3059\u308b\u3059\u3079\u308a\u6761\u4ef6\u304c\u5148\u306b\u6210\u308a\u7acb\u3061\u307e\u3059\u3002':d.tip<d.slide?'\u3053\u306e\u8a2d\u5b9a\u3067\u306f\u3001\u3059\u3079\u308a\u51fa\u3059\u524d\u306b\u8ee2\u5012\u6761\u4ef6\u304c\u5148\u306b\u6210\u308a\u7acb\u3061\u307e\u3059\u3002':'\u3059\u3079\u308a\u3068\u8ee2\u5012\u306e\u5883\u754c\u304c\u307b\u307c\u540c\u3058\u3067\u3059\u3002';
  formula.innerHTML=`<div>\u73fe\u5728\u306e\u9759\u6b62\u6469\u64e6\u529b = mg sin\u03b8 = ${fmt(d.mg)} \u00d7 sin ${fmt(d.th*180/Math.PI)}\u00b0 = ${fmt(d.down)} N</div><div>\u5782\u76f4\u6297\u529b N = mg cos\u03b8 = ${fmt(d.mg)} \u00d7 cos ${fmt(d.th*180/Math.PI)}\u00b0 = ${fmt(d.N)} N</div><div>\u6700\u5927\u9759\u6b62\u6469\u64e6\u529b = \u03bcN = tan \u03b8\u2080 \u00d7 N = tan ${fmt(d.frictionAngle*180/Math.PI)}\u00b0 \u00d7 ${fmt(d.N)} = ${fmt(d.mu*d.N)} N</div><div>\u3059\u3079\u308a\u5883\u754c\u3067\u306f\u3001mgsin\u03b8 \u3068 \u03bc mgcos\u03b8 \u304c\u7b49\u3057\u304f\u306a\u308a\u307e\u3059\u3002</div><div>\u3059\u306a\u308f\u3061 mgsin\u03b8 = \u03bc mgcos\u03b8 \u306a\u306e\u3067\u3001\u03bc = tan\u03b8 \u3068\u306a\u308a\u3001\u305d\u306e\u89d2\u5ea6\u3092 \u03b8\u2080 \u3068\u3057\u307e\u3059\u3002</div><div>\u8ee2\u5012\u5883\u754c\u306f tan \u03b8\' = (\u5e95\u8fba)/(\u9ad8\u3055) = ${fmt(d.W,2)}/${fmt(d.H,2)} \u3092\u6e80\u305f\u3059\u89d2\u5ea6\u3067\u3059\u3002</div>`;
}}
function render(){state.phase+=1/60;const d=currentData();updateSummary(d);if(state.mode==='horizontal'){drawHorizontal(d);drawBarHorizontal(d)}else{drawSlope(d);drawBarSlope(d)}requestAnimationFrame(render)}
function resizeAll(){resizeCanvas(sceneCanvas,sceneCtx);resizeCanvas(barCanvas,barCtx)}
document.querySelectorAll('[data-mode]').forEach(btn=>btn.addEventListener('click',()=>{state.mode=btn.dataset.mode;renderControls();syncText()}));window.addEventListener('resize',resizeAll);renderControls();syncText();resizeAll();render();
</script>
